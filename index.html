
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <img src="imagen_2026-03-16_152657998.png" alt="Logo CBO" class="logo-cbo">
<h1 class="main-title">Menu</h1>
<h1 class="main-title">Institucional</h1>
<h1 class="main-title">CBO</h1>
    <div class="description">
        <p>Aqui podras ver el menu de almuerzos de la instritucion</p>
        <p>Puedes revisar los dias y horarios de cada almuerzo</p>
    </div>
    
    <style>
        :root {
            --brand-blue: #001f3f;
            --tech-blue-light: #00a8ff;
            --ws: #25D366; --ig: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --yt: #FF0000; --fb: #1877F2; --dc: #5865F2; --tk: #000;
        }

        body {
            margin: 0; padding: 0;
            background-color: #ffffff;
            font-family: 'Quicksand', sans-serif;
            color: #333;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- Círculos Flotantes Notorios --- */
        #circles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .circle {
            position: absolute;
            display: block;
            list-style: none;
            animation: animate linear infinite;
            bottom: -150px;
            border-radius: 50%;
            /* Sombra para que se noten sobre el fondo blanco */
            box-shadow: 0 4px 10px rgba(0, 31, 63, 0.2);
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-1300px) rotate(720deg); opacity: 0; }
        }

        .container {
            z-index: 1;
            width: 90%; max-width: 550px;
            text-align: center; padding: 40px 0;
        }

        .logo-apix { width: 160px; margin-bottom: 5px; }

        .main-title {
            color: var(--brand-blue);
            font-size: 3.5rem; font-weight: 700;
            margin: 0 0 10px 0; letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 1);
        }

        model-viewer { width: 100%; height: 320px; margin: 0 auto; }

        .description {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            padding: 25px; border-radius: 30px;
            border: 2px solid rgba(0, 31, 63, 0.1);
            text-align: left; margin: 20px 0 40px 0;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }

        .description h3 { color: var(--brand-blue); margin-top: 0; text-align: center; }

        .links-grid { display: flex; flex-direction: column; gap: 14px; }

        .btn {
            display: flex; align-items: center; padding: 18px;
            text-decoration: none; color: white; font-weight: bold;
            transition: 0.3s; border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn:hover { transform: scale(1.05); }
        .btn i { width: 40px; font-size: 1.6rem; margin-right: 15px; text-align: center; }

        .btn-ws { background: var(--ws); border-radius: 50px; }
        .btn-dc { background: var(--dc); }
        .btn-tk { background: #000; border-left: 5px solid #69c9d0; border-right: 5px solid #ee1d52; }
        .btn-ig { background: var(--ig); }
        .btn-x  { background: #000; border-radius: 6px; }
        .btn-yt { background: var(--yt); }
        .btn-fb { background: var(--fb); }

    </style>
</head>
<body>

    <div id="circles-container"></div>

    <div class="container">





        </div>
    </div>

    <script>
        function createCircles() {
            const container = document.getElementById('circles-container');
            const count = 80; // Aumentamos la cantidad significativamente
            
            for (let i = 0; i < count; i++) {
                const circle = document.createElement('div');
                circle.className = 'circle';
                
                const size = Math.random() * 80 + 20; 
                const left = Math.random() * 100;
                const duration = Math.random() * 10 + 7; 
                const delay = Math.random() * 20;

                circle.style.width = `${size}px`;
                circle.style.height = `${size}px`;
                circle.style.left = `${left}%`;
                circle.style.animationDuration = `${duration}s`;
                circle.style.animationDelay = `${delay}s`;

                // Colores más notorios (Verde y amarillo del celmira)
                const colorType = Math.random();
                if (colorType > 0.6) {
                    circle.style.background = "rgba(34, 184, 0, 0.3)"; // Verde mas trasparencia
                } else if (colorType > 0.3) {
                    circle.style.background = "rgba(255, 191, 0, 0.7)"; // amarillo
                } else {
                    circle.style.background = "rgba(34, 184, 0, 0.6)";   // verde
                }

                container.appendChild(circle);
            }
        }
        window.onload = createCircles;
    </script>
</body>
</html>
