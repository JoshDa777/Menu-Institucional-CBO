<!doctype html>
<html lang="es">
<meta charset="UTF-8">
<meta name="viewport" content="with=device-with, initial-scale=1.0">



    <style>
        :root {
            --brand-blue: #001f3f;
            --tech-blue-light: #00a8ff;
            --ws: #25D366; --ig: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --yt: #FF0000; --fb: #1877F2; --dc: #5865F2; --tk: #000;
        }

        body {
            margin: 0; padding: 0;
            background-color: #ffffff;
            font-family: 'Quicksand', sans-serif;
            color: #333;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- Círculos Flotantes Notorios --- */
        #circles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .circle {
            position: absolute;
            display: block;
            list-style: none;
            animation: animate linear infinite;
            bottom: -150px;
            border-radius: 50%;
            /* Sombra para que se noten sobre el fondo blanco */
            box-shadow: 0 4px 10px rgba(0, 31, 63, 0.2);
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-1300px) rotate(720deg); opacity: 0; }
        }

        .container {
            z-index: 1;
            width: 90%; max-width: 550px;
            text-align: center; padding: 40px 0;
        }
    </style>
  </meta>
</html>
